<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
    (function () {
      if (window.location.protocol !== "file:") {
        return;
      }

      var onlineUrl = "https://jerreyliang2009.github.io/Crystal-Cell-Visualizer/";
      var checkScript = document.createElement("script");
      var finished = false;
      var timeoutId = window.setTimeout(function () {
        finished = true;
        checkScript.onload = null;
        checkScript.onerror = null;
        checkScript.remove();
      }, 5000);

      checkScript.onload = function () {
        if (finished) {
          return;
        }

        finished = true;
        window.clearTimeout(timeoutId);

        if (window.__CRYSTAL_CELL_VISUALIZER_ONLINE_OK__ === true) {
          window.location.replace(onlineUrl);
        }
      };

      checkScript.onerror = function () {
        if (finished) {
          return;
        }

        finished = true;
        window.clearTimeout(timeoutId);
        checkScript.remove();
      };

      checkScript.src = onlineUrl + "online-check.js?t=" + Date.now();
      document.head.appendChild(checkScript);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高中化学晶胞结构可视化</title>
  <link rel="stylesheet" href="./css/style.css?v=openai-logo-polish-4">
</head>
<body>
  <div class="app-shell">
    <main class="app-main">
      <section class="viewer-panel" aria-labelledby="viewer-title">
        <div class="section-head">
          <h2 id="viewer-title">3D 展示区</h2>
          <p>根据当前选中的晶胞动态加载模型。</p>
        </div>
        <div
          id="crystal-viewer"
          class="viewer-canvas"
          aria-label="晶胞三维展示区域"
        ></div>
        <p id="atom-contribution-hint" class="atom-contribution-hint" hidden>
          点按原子查看它对晶胞的贡献
        </p>
      </section>
    </main>

    <aside
      id="floating-ui"
      class="floating-ui is-right"
      aria-label="页面说明与控制面板"
    >
      <div id="floating-ui-body" class="floating-ui-body">
        <header class="app-header">
          <p class="eyebrow">Crystal-Cell-Visualizer</p>
          <h1>晶胞结构可视化</h1>
          <div class="hero-author" aria-label="作者信息">
            <img
              class="hero-author-avatar"
              src="./assets/icons/author-avatar.jpg"
              alt="Jerrey_liang 头像"
            >
            <div class="hero-author-text">
              <p class="hero-author-line">Powered By Jerrey_liang</p>
              <p class="hero-coding-line">
                <img
                  class="openai-logo"
                  src="./assets/icons/openai-logo.svg"
                  alt=""
                  aria-hidden="true"
                >
                <span>Coding By ChatGPT Codex</span>
              </p>
            </div>
          </div>
        </header>

        <section class="control-panel" aria-labelledby="control-title">
          <div class="section-head">
            <h2 id="control-title">控制面板</h2>
          </div>

          <section class="selector-card" aria-labelledby="selector-title">
            <h3 id="selector-title">晶胞选择</h3>
            <select
              id="crystal-select"
              class="control-select"
              aria-label="晶胞选择"
            ></select>
          </section>

          <section class="selector-card" aria-labelledby="view-title">
            <h3 id="view-title">标准视角</h3>
            <select
              id="view-select"
              class="control-select"
              aria-label="标准视角选择"
            ></select>
          </section>

          <div class="control-group">
            <div class="control-row">
              <button id="btn-view-lock" class="control-button" type="button">
                锁定视角
              </button>
              <button id="btn-auto-rotate" class="control-button" type="button">
                自动旋转
              </button>
            </div>
            <div class="control-row">
              <button
                id="btn-show-coordination"
                class="control-button"
                type="button"
                disabled
              >
                显示配位
              </button>
              <button
                id="btn-show-count"
                class="control-button"
                type="button"
                aria-label="切换模型内原子贡献标注"
                disabled
              >
                原子贡献标注
              </button>
            </div>
            <button
              id="btn-show-coordinate-card"
              class="control-button"
              type="button"
              aria-label="切换点击原子时的位置信息卡片"
            >
              原子位置卡片
            </button>
            <button id="btn-show-cell-axes" class="control-button" type="button">
              晶胞内坐标轴
            </button>
            <button
              id="btn-show-auxiliary"
              class="control-button"
              type="button"
              disabled
            >
              显示辅助原子
            </button>
          </div>
        </section>
      </div>

    </aside>

    <div class="panel-toolbar panel-side-toolbar is-left" aria-label="信息栏位置控制">
      <button
        id="btn-panel-side"
        class="panel-toggle-button"
        type="button"
        aria-label="切换信息栏到左侧"
      >
        移到左侧
      </button>
    </div>

    <div class="panel-toolbar panel-collapse-toolbar is-right" aria-label="信息栏展开控制">
      <button
        id="btn-panel-collapse"
        class="panel-toggle-button"
        type="button"
        aria-controls="floating-ui-body"
        aria-expanded="true"
        aria-label="收起信息栏"
      >
        收起信息栏
      </button>
    </div>

    <aside
      id="atom-legend-floating"
      class="atom-legend-panel is-left"
      aria-label="原子名称示意"
      hidden
    >
      <div class="atom-legend-card">
        <h2 id="atom-legend-heading">原子名称示意</h2>
        <div id="atom-legend-content" class="atom-legend-content">
          <p class="knowledge-empty">当前晶胞暂无原子示意。</p>
        </div>
      </div>
    </aside>
  </div>

  <script src="./vendor/three/three.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js';"></script>
  <script src="./vendor/three/OrbitControls.js"></script>
  <script src="./js/resourcePaths.js"></script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
